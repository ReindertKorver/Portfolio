<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vier Eeuwen van het Geslacht Corver/Korver</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Georgia, "Times New Roman", serif;
        background: #faf7f2;
        color: #2c2c2c;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      /* ── Header ─────────────────────────────────────────────── */
      header {
        background: #3b2a1a;
        color: #f5e8d0;
        padding: 1.2rem 2rem;
        flex-shrink: 0;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        z-index: 100;
      }

      header h1 {
        font-size: 1.4rem;
        font-weight: bold;
        letter-spacing: 0.02em;
      }
      header p {
        font-size: 0.85rem;
        color: #c8b89a;
        margin-top: 0.25rem;
      }

      header nav {
        margin-top: 0.75rem;
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }
      header nav a {
        font-size: 0.82rem;
        font-family: Georgia, serif;
        color: #f5e8d0;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.25);
        padding: 0.25rem 0.75rem;
        border-radius: 4px;
        text-decoration: none;
        transition: background 0.15s;
      }
      header nav a:hover {
        background: rgba(255, 255, 255, 0.22);
      }
      header nav a.active {
        background: #c4a97a;
        border-color: #c4a97a;
        color: #1a1209;
        font-weight: bold;
        cursor: default;
        pointer-events: none;
      }

      /* ── Controls bar ────────────────────────────────────────── */
      #controls {
        background: #f0e8d8;
        border-bottom: 1px solid #d9c9b0;
        padding: 0.5rem 1.25rem;
        display: flex;
        align-items: center;
        gap: 0.6rem;
        flex-wrap: wrap;
        flex-shrink: 0;
        z-index: 50;
      }

      #search-wrap {
        position: relative;
        display: flex;
        align-items: center;
      }

      #search-input {
        padding: 0.55rem 0.9rem;
        font-size: 1rem;
        font-family: inherit;
        border: 1px solid #c4a97a;
        border-radius: 6px;
        background: #fff;
        color: #2c2c2c;
        outline: none;
        min-width: 220px;
        transition: border-color 0.2s;
      }
      #search-input:focus {
        border-color: #7a4e28;
        box-shadow: 0 0 0 3px rgba(122, 78, 40, 0.15);
      }

      #search-results {
        background: #fff;
        border: 1px solid #c4a97a;
        border-radius: 6px;
        max-height: 260px;
        overflow-y: auto;
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        right: 0;
        z-index: 200;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
      }
      #search-results .sr-item {
        padding: 0.5rem 0.9rem;
        cursor: pointer;
        font-size: 0.9rem;
        border-bottom: 1px solid #f0e8d8;
      }
      #search-results .sr-item:last-child {
        border-bottom: none;
      }
      #search-results .sr-item:hover,
      #search-results .sr-item:focus {
        background: #f5ebe0;
        outline: none;
      }
      #search-results .sr-item .sr-name {
        font-weight: bold;
        color: #3b2a1a;
      }
      #search-results .sr-item .sr-dates {
        color: #7a6a55;
        font-size: 0.8rem;
        margin-left: 0.4rem;
      }
      #search-results .empty {
        padding: 0.6rem 0.9rem;
        color: #999;
        font-size: 0.9rem;
      }

      .ctrl-btn {
        padding: 0.38rem 0.85rem;
        font-size: 0.85rem;
        font-family: inherit;
        background: #3b2a1a;
        color: #f5e8d0;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        white-space: nowrap;
        transition: background 0.15s;
        line-height: 1;
      }
      .ctrl-btn:hover {
        background: #5a4030;
      }

      .ctrl-btn.zoom-btn {
        padding: 0.38rem 0.7rem;
        font-size: 1rem;
        font-weight: bold;
      }

      #stats-label {
        font-size: 0.78rem;
        color: #7a6a55;
        margin-left: auto;
      }

      /* ── SVG canvas ──────────────────────────────────────────── */
      #tree-svg {
        flex: 1;
        display: block;
        background: #faf7f2;
        cursor: grab;
      }
      #tree-svg:active {
        cursor: grabbing;
      }

      /* ── SVG node styles (applied via D3) ──────────────────── */
      .node-rect {
        transition: fill 0.12s;
      }

      /* ── Scrollbar ───────────────────────────────────────────── */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f0e8d8;
      }
      ::-webkit-scrollbar-thumb {
        background: #c4a97a;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1 id="title">Vier Eeuwen van het Geslacht Corver/Korver</h1>
      <p id="subtitle"></p>
      <nav>
        <a href="family_tree.html">Weergave 1</a>
        <a href="family_tree_other.html" class="active">Weergave 2</a>
      </nav>
    </header>

    <div id="controls">
      <div id="search-wrap">
        <input
          id="search-input"
          type="search"
          placeholder="Zoek op naam…"
          autocomplete="off"
        />
        <div id="search-results" hidden></div>
      </div>
      <button id="btn-toggle-all" class="ctrl-btn">Alles inladen</button>
      <button id="btn-zoom-in" class="ctrl-btn zoom-btn" title="Zoom in">
        +
      </button>
      <button id="btn-zoom-out" class="ctrl-btn zoom-btn" title="Zoom out">
        −
      </button>
      <button id="btn-reset" class="ctrl-btn">Reset weergave</button>
      <span id="stats-label"></span>
    </div>

    <svg id="tree-svg">
      <g id="tree-g">
        <g id="links-g"></g>
        <g id="nodes-g"></g>
      </g>
    </svg>

    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <script>
      "use strict";

      // ── Constants ────────────────────────────────────────────────────────────
      const NODE_W = 180;
      const NODE_H_FULL = 66; // has years line
      const NODE_H_SIMPLE = 46; // name only
      const LEAF_W = 130;
      const LEAF_H = 36;
      const H_SPACING = 220; // nodeSize x
      const V_SPACING = 130; // nodeSize y (increased for taller nodes)
      const ANIM_MS = 400;
      const MAX_NAME_LEN = 22;

      const COL = {
        bg: "#faf7f2",
        nodeFill: "#fff8ef",
        nodeBorder: "#e0cdb0",
        nodeHover: "#f0e4d0",
        leafFill: "#f5f0e8",
        link: "#d9c9b0",
        nameText: "#1a1209",
        mutedText: "#7a6a55",
        leafName: "#9a8a75",
        badge: "#c4a97a",
        highlight: "#ffe08a",
        highlightStroke: "#c4a97a",
      };

      // ── Helpers ──────────────────────────────────────────────────────────────
      function truncate(str, maxLen) {
        return str && str.length > maxLen
          ? str.slice(0, maxLen - 1) + "…"
          : str || "";
      }

      function yearsStr(d) {
        const b = d.data.born,
          di = d.data.died;
        if (!b && !di) return null;
        if (b && di) return b + " – " + di;
        return b || di;
      }

      function isLeaf(d) {
        // A leaf is a node with no children (and no collapsed children)
        return !d.children && !d._children;
      }

      function nodeW(d) {
        return NODE_W;
      }
      function nodeH(d) {
        const yr = yearsStr(d);
        const hasExtra =
          !!(d.data.spouses && d.data.spouses.length) || !!d.data.notes;
        if (yr && hasExtra) return NODE_H_FULL + 18;
        if (yr) return NODE_H_FULL;
        return NODE_H_SIMPLE;
      }

      // ── D3 setup ─────────────────────────────────────────────────────────────
      const svg = d3.select("#tree-svg");
      const gTree = d3.select("#tree-g");
      const gLinks = d3.select("#links-g");
      const gNodes = d3.select("#nodes-g");

      const treeLayout = d3.tree().nodeSize([H_SPACING, V_SPACING]);

      let zoom = d3
        .zoom()
        .scaleExtent([0.05, 3])
        .on("zoom", (event) => {
          gTree.attr("transform", event.transform);
        });

      svg.call(zoom);

      let root;
      let nodeIdCounter = 0;
      let allExpanded = false;
      let searchIndex = [];
      let _highlightedNavId = null;

      // ── Collapse helpers ─────────────────────────────────────────────────────
      function collapse(d) {
        if (d.children) {
          d._children = d.children;
          d._children.forEach(collapse);
          d.children = null;
        }
      }

      function expand(d) {
        if (d._children) {
          d.children = d._children;
          d._children = null;
        }
        if (d.children) {
          d.children.forEach(expand);
        }
      }

      function expandToDepth(node, maxDepth, currentDepth) {
        currentDepth = currentDepth || 0;
        if (node._children && currentDepth < maxDepth) {
          node.children = node._children;
          node._children = null;
        }
        if (node.children) {
          node.children.forEach((c) =>
            expandToDepth(c, maxDepth, currentDepth + 1),
          );
        }
      }

      // ── Assign navigation IDs to every node ─────────────────────────────────
      let _autoNavCounter = 0;
      function assignNavIds(node) {
        node._navId = node.genId || "~" + ++_autoNavCounter;
        (node.children || []).forEach(assignNavIds);
      }

      // ── Build search index ────────────────────────────────────────────────────
      function buildIndex(node, ancestors) {
        ancestors = ancestors || [];
        searchIndex.push({
          name: node.name,
          genId: node.genId,
          navId: node._navId,
          born: node.born,
          died: node.died,
          ancestors: [...ancestors],
        });
        const kids = node.children || node._children || [];
        kids.forEach((c) => buildIndex(c, [...ancestors, node._navId]));
      }

      // ── Find a node by navId, traversing both children and _children ──────────
      function findNodeByGenId(navId) {
        let found = null;
        function walk(node) {
          if (found) return;
          if (node.data._navId === navId) {
            found = node;
            return;
          }
          (node.children || []).forEach(walk);
          (node._children || []).forEach(walk);
        }
        walk(root);
        return found;
      }

      // ── Expand the path from root down to the node with the given navId ────────
      // Returns the target node if found, null otherwise.
      function expandPathTo(navId) {
        function walk(node) {
          if (node.data._navId === navId) return node;
          const kids = (node.children || []).concat(node._children || []);
          for (const c of kids) {
            const hit = walk(c);
            if (hit) {
              // This node is on the path — make sure it is expanded
              if (node._children) {
                node.children = node._children;
                node._children = null;
              }
              return hit;
            }
          }
          return null;
        }
        return walk(root);
      }

      // ── fitTree ───────────────────────────────────────────────────────────────
      function fitTree() {
        const svgEl = svg.node();
        const svgW = svgEl.clientWidth || svgEl.getBoundingClientRect().width;
        const svgH = svgEl.clientHeight || svgEl.getBoundingClientRect().height;
        const bbox = gNodes.node().getBBox();
        if (!bbox.width || !bbox.height) return;
        const pad = 40;
        const scale = Math.min(
          (svgW - pad * 2) / bbox.width,
          (svgH - pad * 2) / bbox.height,
          1,
        );
        const tx = svgW / 2 - scale * (bbox.x + bbox.width / 2);
        const ty = pad - scale * bbox.y;
        svg.call(
          zoom.transform,
          d3.zoomIdentity.translate(tx, ty).scale(scale),
        );
      }

      // ── update / render ───────────────────────────────────────────────────────
      function update(source) {
        const treeData = treeLayout(root);
        const nodes = treeData.descendants();
        const links = treeData.links();

        // Override y to use fixed spacing
        nodes.forEach((d) => {
          d.y = d.depth * V_SPACING;
        });

        /* ── LINKS ── */
        const linkGen = d3
          .linkVertical()
          .x((d) => d.x)
          .y((d) => d.y);

        const link = gLinks
          .selectAll("path.link")
          .data(links, (d) => d.target.id || (d.target.id = ++nodeIdCounter));

        const linkEnter = link
          .enter()
          .append("path")
          .attr("class", "link")
          .attr("fill", "none")
          .attr("stroke", COL.link)
          .attr("stroke-width", 1.5)
          .attr("d", () => {
            const o = { x: source.x0 ?? source.x, y: source.y0 ?? source.y };
            return linkGen({ source: o, target: o });
          });

        linkEnter
          .merge(link)
          .transition()
          .duration(ANIM_MS)
          .ease(d3.easeCubicInOut)
          .attr("d", linkGen);

        link
          .exit()
          .transition()
          .duration(ANIM_MS)
          .ease(d3.easeCubicInOut)
          .attr("d", () => {
            const o = { x: source.x, y: source.y };
            return linkGen({ source: o, target: o });
          })
          .remove();

        /* ── NODES ── */
        const node = gNodes
          .selectAll("g.node")
          .data(nodes, (d) => d.id || (d.id = ++nodeIdCounter));

        // ENTER
        const nodeEnter = node
          .enter()
          .append("g")
          .attr("class", "node")
          .attr(
            "transform",
            () =>
              `translate(${source.x0 ?? source.x},${source.y0 ?? source.y})`,
          )
          .style("opacity", 0);

        // Background rect
        nodeEnter.each(function (d) {
          const g = d3.select(this);
          const leaf = isLeaf(d);
          const yr = yearsStr(d);
          const w = nodeW(d);
          const h = nodeH(d); // dynamic: taller when years present
          const hasKids = !!(d.children || d._children);

          // Extra sub-line (spouses / notes) shown for ALL nodes
          const extraParts = [];
          if (d.data.spouses && d.data.spouses.length)
            extraParts.push("Huwt: " + d.data.spouses.join(", "));
          if (d.data.notes) extraParts.push(d.data.notes);
          const hasExtra = extraParts.length > 0;

          // Unified vertical text positions
          // Three possible rows: name · years · extra
          // Anchor everything around centre (y=0), spacing 14px per row
          const rows = (yr ? 1 : 0) + (hasExtra ? 1 : 0); // rows below name
          const nameY =
            rows === 2 ? -14 : rows === 1 ? -7 : d.data.genId ? 6 : 0;
          const yearsY = rows === 2 ? 0 : 7;
          const extraY = rows === 2 ? 14 : yr ? 21 : 7;

          // Click to toggle
          if (!leaf && hasKids) {
            g.style("cursor", "pointer").on("click", (event, nd) => {
              event.stopPropagation();
              if (nd.children) {
                nd._children = nd.children;
                nd.children = null;
              } else {
                nd.children = nd._children;
                nd._children = null;
              }
              update(nd);
              // Pan so the clicked node stays visible with its new children
              if (nd.children) {
                const svgEl = svg.node();
                const svgW =
                  svgEl.clientWidth || svgEl.getBoundingClientRect().width;
                const svgH =
                  svgEl.clientHeight || svgEl.getBoundingClientRect().height;
                const currentTransform = d3.zoomTransform(svgEl);
                const k = currentTransform.k;
                const tx = svgW / 2 - k * nd.x;
                const ty = svgH * 0.25 - k * nd.y;
                svg
                  .transition()
                  .duration(ANIM_MS)
                  .call(
                    zoom.transform,
                    d3.zoomIdentity.translate(tx, ty).scale(k),
                  );
              }
            });
          }

          // Main rect
          g.append("rect")
            .attr("class", "node-rect")
            .attr("x", -w / 2)
            .attr("y", -h / 2)
            .attr("width", w)
            .attr("height", h)
            .attr("rx", 6)
            .attr("fill", leaf ? COL.leafFill : COL.nodeFill)
            .attr("stroke", COL.nodeBorder)
            .attr("stroke-width", 1)
            .on("mouseover", function () {
              if (!d3.select(this).classed("highlighted")) {
                d3.select(this).attr("fill", COL.nodeHover);
              }
            })
            .on("mouseout", function () {
              if (!d3.select(this).classed("highlighted")) {
                d3.select(this).attr(
                  "fill",
                  leaf ? COL.leafFill : COL.nodeFill,
                );
              }
            });

          // SVG tooltip (full name on hover)
          g.append("title").text(
            d.data.name +
              (d.data.born ? "\nGeb.: " + d.data.born : "") +
              (d.data.died ? "\nOverl.: " + d.data.died : "") +
              (d.data.spouses && d.data.spouses.length
                ? "\nHuwt: " + d.data.spouses.join(", ")
                : ""),
          );

          if (!leaf) {
            // Gen-ID badge
            if (d.data.genId) {
              const badgeW = 22,
                badgeH = 14;
              g.append("rect")
                .attr("x", -w / 2 + 4)
                .attr("y", -h / 2 + 4)
                .attr("width", badgeW)
                .attr("height", badgeH)
                .attr("rx", 3)
                .attr("fill", COL.badge);

              g.append("text")
                .attr("x", -w / 2 + 4 + badgeW / 2)
                .attr("y", -h / 2 + 4 + badgeH / 2 + 1)
                .attr("text-anchor", "middle")
                .attr("dominant-baseline", "middle")
                .attr("fill", "#fff")
                .attr("font-size", "9px")
                .attr("font-family", "Georgia, serif")
                .text(d.data.genId);
            }

            // Name
            g.append("text")
              .attr("class", "node-name")
              .attr("x", 0)
              .attr("y", nameY)
              .attr("text-anchor", "middle")
              .attr("dominant-baseline", "middle")
              .attr("fill", COL.nameText)
              .attr("font-size", "11px")
              .attr("font-weight", "bold")
              .attr("font-family", "Georgia, serif")
              .text(truncate(d.data.name, MAX_NAME_LEN));

            // Years
            if (yr) {
              g.append("text")
                .attr("class", "node-years")
                .attr("x", 0)
                .attr("y", yearsY)
                .attr("text-anchor", "middle")
                .attr("dominant-baseline", "middle")
                .attr("fill", COL.mutedText)
                .attr("font-size", "9px")
                .attr("font-family", "Georgia, serif")
                .text(yr);
            }

            // Extra line (spouses / notes)
            if (hasExtra) {
              g.append("text")
                .attr("x", 0)
                .attr("y", extraY)
                .attr("text-anchor", "middle")
                .attr("dominant-baseline", "middle")
                .attr("fill", COL.mutedText)
                .attr("font-size", "8px")
                .attr("font-family", "Georgia, serif")
                .text(truncate(extraParts[0], 28));
            }

            // Expand/collapse triangle indicator
            if (hasKids) {
              g.append("text")
                .attr("class", "expand-indicator")
                .attr("x", 0)
                .attr("y", h / 2 - 2)
                .attr("text-anchor", "middle")
                .attr("dominant-baseline", "auto")
                .attr("fill", COL.mutedText)
                .attr("font-size", "8px")
                .attr("font-family", "sans-serif")
                .text(d.children ? "▼" : "▶");
            }
          } else {
            // Leaf: same layout as non-leaf but muted style
            g.append("text")
              .attr("class", "node-name")
              .attr("x", 0)
              .attr("y", nameY)
              .attr("text-anchor", "middle")
              .attr("dominant-baseline", "middle")
              .attr("fill", COL.leafName)
              .attr("font-size", "10px")
              .attr("font-family", "Georgia, serif")
              .text(truncate(d.data.name, MAX_NAME_LEN));

            if (yr) {
              g.append("text")
                .attr("class", "node-years")
                .attr("x", 0)
                .attr("y", yearsY)
                .attr("text-anchor", "middle")
                .attr("dominant-baseline", "middle")
                .attr("fill", COL.mutedText)
                .attr("font-size", "9px")
                .attr("font-family", "Georgia, serif")
                .text(yr);
            }

            if (hasExtra) {
              g.append("text")
                .attr("x", 0)
                .attr("y", extraY)
                .attr("text-anchor", "middle")
                .attr("dominant-baseline", "middle")
                .attr("fill", COL.mutedText)
                .attr("font-size", "8px")
                .attr("font-family", "Georgia, serif")
                .text(truncate(extraParts[0], 28));
            }
          }
        });

        // MERGE: animate position, update expand indicator & highlight
        const nodeUpdate = nodeEnter.merge(node);

        nodeUpdate
          .transition()
          .duration(ANIM_MS)
          .ease(d3.easeCubicInOut)
          .attr("transform", (d) => `translate(${d.x},${d.y})`)
          .style("opacity", 1);

        // Keep expand indicator in sync after merge
        nodeUpdate.each(function (d) {
          const g = d3.select(this);
          g.select(".expand-indicator").text(d.children ? "▼" : "▶");
          // Re-apply highlight if this is the target node
          const isHighlighted =
            _highlightedNavId && d.data._navId === _highlightedNavId;
          const leaf = isLeaf(d);
          g.select("rect.node-rect")
            .classed("highlighted", isHighlighted)
            .attr(
              "fill",
              isHighlighted
                ? COL.highlight
                : leaf
                  ? COL.leafFill
                  : COL.nodeFill,
            )
            .attr(
              "stroke",
              isHighlighted ? COL.highlightStroke : COL.nodeBorder,
            )
            .attr("stroke-width", isHighlighted ? 2 : 1);
        });

        // EXIT
        node
          .exit()
          .transition()
          .duration(ANIM_MS)
          .ease(d3.easeCubicInOut)
          .attr("transform", () => `translate(${source.x},${source.y})`)
          .style("opacity", 0)
          .remove();

        // Save positions
        nodes.forEach((d) => {
          d.x0 = d.x;
          d.y0 = d.y;
        });
      }

      // ── Search ────────────────────────────────────────────────────────────────
      (function () {
        const input = document.getElementById("search-input");
        const box = document.getElementById("search-results");

        input.addEventListener("input", () => {
          const q = input.value.trim().toLowerCase();
          box.innerHTML = "";
          if (q.length < 2) {
            box.hidden = true;
            return;
          }

          const hits = searchIndex
            .filter(
              (p) =>
                (p.name && p.name.toLowerCase().includes(q)) ||
                (p.born && p.born.toLowerCase().includes(q)) ||
                (p.died && p.died.toLowerCase().includes(q)),
            )
            .slice(0, 40);

          if (!hits.length) {
            box.innerHTML =
              '<div class="empty">Geen resultaten gevonden.</div>';
          } else {
            hits.forEach((p) => {
              const div = document.createElement("div");
              div.className = "sr-item";
              div.tabIndex = 0;
              const navId = p.navId;
              const displayAncestor =
                p.ancestors && p.ancestors[p.ancestors.length - 1];
              div.innerHTML =
                `<span class="sr-name">${p.name}</span>` +
                (p.genId
                  ? ` <span class="sr-dates">[${p.genId}]</span>`
                  : displayAncestor && !displayAncestor.startsWith("~")
                    ? ` <span class="sr-dates">↳ ${displayAncestor}</span>`
                    : "") +
                (p.born || p.died
                  ? ` <span class="sr-dates">${[p.born, p.died].filter(Boolean).join(" – ")}</span>`
                  : "");
              const navigate = () => {
                box.hidden = true;
                input.value = "";
                if (!navId) return;
                const targetNode = expandPathTo(navId);
                update(root);
                if (targetNode) panToNode(targetNode);
              };
              div.addEventListener("click", navigate);
              div.addEventListener("keydown", (e) => {
                if (e.key === "Enter") navigate();
              });
              box.appendChild(div);
            });
          }
          box.hidden = false;
        });

        document.addEventListener("click", (e) => {
          if (!document.getElementById("search-wrap").contains(e.target))
            box.hidden = true;
        });
      })();

      function panToNode(d) {
        // Clear previous highlight
        _highlightedNavId = d.data._navId;
        // Sync highlight colours on all currently rendered nodes
        gNodes.selectAll("g.node").each(function (nd) {
          const isHighlighted = nd.data._navId === _highlightedNavId;
          const leaf = isLeaf(nd);
          d3.select(this)
            .select("rect.node-rect")
            .classed("highlighted", isHighlighted)
            .attr(
              "fill",
              isHighlighted
                ? COL.highlight
                : leaf
                  ? COL.leafFill
                  : COL.nodeFill,
            )
            .attr(
              "stroke",
              isHighlighted ? COL.highlightStroke : COL.nodeBorder,
            )
            .attr("stroke-width", isHighlighted ? 2 : 1);
        });

        const svgEl = svg.node();
        const svgW = svgEl.clientWidth || svgEl.getBoundingClientRect().width;
        const svgH = svgEl.clientHeight || svgEl.getBoundingClientRect().height;
        // Clamp to a legible zoom: keep current scale if already zoomed in,
        // but always zoom to at least 0.6 so the node is readable.
        const currentScale = d3.zoomTransform(svgEl).k;
        const scale = Math.max(currentScale, 0.6);
        const tx = svgW / 2 - scale * d.x;
        const ty = svgH / 2 - scale * d.y;
        svg
          .transition()
          .duration(500)
          .ease(d3.easeCubicInOut)
          .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
      }

      // ── Controls ─────────────────────────────────────────────────────────────
      document
        .getElementById("btn-toggle-all")
        .addEventListener("click", function () {
          if (!allExpanded) {
            expand(root);
            this.textContent = "Alles inklappen";
            allExpanded = true;
          } else {
            // Collapse everything, then restore initial 3-generation view
            if (root.children) root.children.forEach(collapse);
            expandToDepth(root, 2);
            this.textContent = "Alles inladen";
            allExpanded = false;
          }
          update(root);
        });

      document.getElementById("btn-zoom-in").addEventListener("click", () => {
        svg.transition().duration(300).call(zoom.scaleBy, 1.3);
      });
      document.getElementById("btn-zoom-out").addEventListener("click", () => {
        svg
          .transition()
          .duration(300)
          .call(zoom.scaleBy, 1 / 1.3);
      });
      document.getElementById("btn-reset").addEventListener("click", () => {
        fitTree();
      });

      // ── Resize ────────────────────────────────────────────────────────────────
      window.addEventListener("resize", () => {
        // Re-fit preserves scale only if explicitly triggered
      });

      // ── Bootstrap ────────────────────────────────────────────────────────────
      fetch("korver_family_tree_merged.json")
        .then((r) => r.json())
        .then((data) => {
          // Header
          document.getElementById("title").textContent = data.meta.title;
          document.getElementById("subtitle").textContent =
            "De mannelijke lijn Corver/Korver door veertien generaties";
          document.title = data.meta.title;

          // Stats
          document.getElementById("stats-label").textContent =
            data.meta.totalGenerations +
            " generaties · " +
            data.meta.totalPersonsWithOwnEntry +
            " personen";

          // Assign navigation IDs to every node
          assignNavIds(data.tree);

          // Build D3 hierarchy
          root = d3.hierarchy(data.tree, (d) => d.children);
          root.x0 = 0;
          root.y0 = 0;

          // Collapse all first
          root.descendants().forEach(collapse);

          // Build search index from the raw data (before any collapse)
          buildIndex(data.tree);

          // Expand first 3 generations (depth 0, 1, 2)
          expandToDepth(root, 2);

          // Initial render
          update(root);

          // Auto-fit after short delay (DOM must settle)
          setTimeout(fitTree, 50);
        })
        .catch((err) => {
          document.body.innerHTML += `<p style="color:red;padding:1rem">Fout bij laden: ${err.message}</p>`;
        });
    </script>
  </body>
</html>
